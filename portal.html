<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HA // ARCHIVE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bellefair&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0d12;
            --off-white: #e0e0e0;
            --eva-red: #ff003c;
            --border-muted: #1e2630;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-deep);
            color: var(--off-white);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px;
            background-image: 
                linear-gradient(rgba(18, 16, 16, 0.2) 50%, rgba(0, 0, 0, 0.1) 50%), 
                linear-gradient(#0a0d12, #05070a);
            background-size: 100% 4px, 100% 100%;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            border-bottom: 2px solid var(--eva-red);
            margin-bottom: 40px;
            padding-bottom: 10px;
        }

        .title {
            font-family: 'Bellefair', serif;
            font-size: 6rem;
            line-height: 0.8;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: -2px;
            color: var(--eva-red);
            font-weight: 400;
            text-shadow: 1px 0px 0px var(--eva-red), -1px 0px 0px var(--eva-red), 0px 0.5px 0px var(--eva-red);
            display: block;
            transform: scaleX(0.95);
            transform-origin: left;
            width: 110%;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 60px;
        }

        .gallery-item {
            border: 1px solid var(--border-muted);
            aspect-ratio: 1/1;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.55rem;
            color: #333;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-family: monospace;
            border-style: dashed;
        }

        .upload-terminal {
            border: 1px solid var(--eva-red);
            background: #000;
            position: relative;
            padding: 5px;
            height: 600px;
            overflow: hidden;
        }

        .upload-terminal::before {
            content: "SECURE UPLOAD PORTAL // NO LOGIN REQUIRED";
            position: absolute;
            top: -10px; left: 15px;
            background: var(--bg-deep);
            padding: 0 10px;
            font-size: 0.6rem;
            color: var(--eva-red);
            font-weight: bold;
            letter-spacing: 1px;
            z-index: 10;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            /* This filter helps match the form to your site's dark aesthetic */
            filter: invert(90%) hue-rotate(180deg) brightness(1.1) contrast(1.1);
        }

        .back-link {
            display: inline-block;
            margin-top: 40px;
            color: #555;
            text-decoration: none;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .back-link:hover { color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 class="title">THE ARCHIVE</h1>
    </div>

    <p style="font-size: 0.75rem; letter-spacing: 1px; margin-bottom: 30px; opacity: 0.6; text-transform: uppercase;">
        // MODERATED USER UPLOADS
    </p>

    <div class="gallery-grid">
        <div class="gallery-item"https://storage.tally.so/private/PXL_20240131_221155288.jpg?id=0kZLWA</div>
        <div class="gallery-item">WAITING FOR SIGNAL...</div>
        <div class="gallery-item">WAITING FOR SIGNAL...</div>
    </div>

    <div class="upload-terminal">
        <!-- PASTE YOUR TALLY FORM LINK HERE -->
        <iframe src="https://tally.so/r/LZJXeG?transparentBackground=1" title="Archive Upload"></iframe>
    </div>

    <a href="index.html" class="back-link">← RETURN TO MAIN TERMINAL</a>
</div>

</body>
</html>
