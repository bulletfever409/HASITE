<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HA // ARCHIVE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bellefair&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0d12;
            --off-white: #e0e0e0;
            --eva-red: #ff003c;
            --border-muted: #1e2630;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-deep);
            color: var(--off-white);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px;
            background-image: 
                linear-gradient(rgba(18, 16, 16, 0.2) 50%, rgba(0, 0, 0, 0.1) 50%), 
                linear-gradient(#0a0d12, #05070a);
            background-size: 100% 4px, 100% 100%;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            border-bottom: 2px solid var(--eva-red);
            margin-bottom: 40px;
            padding-bottom: 10px;
        }

        .title {
            font-family: 'Bellefair', serif;
            font-size: 6rem;
            line-height: 0.8;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: -2px;
            color: var(--eva-red);
            font-weight: 400;
            text-shadow: 1px 0px 0px var(--eva-red), -1px 0px 0px var(--eva-red), 0px 0.5px 0px var(--eva-red);
            display: block;
            transform: scaleX(0.95);
            transform-origin: left;
            width: 110%;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 60px;
        }

        .gallery-item {
            border: 1px solid var(--border-muted);
            aspect-ratio: 1/1;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.55rem;
            color: #333;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-family: monospace;
            border-style: dashed;
        }

        .upload-terminal {
            border: 1px solid var(--eva-red);
            background: rgba(0, 0, 0, 0.6);
            padding: 30px;
            position: relative;
        }

        .upload-terminal::before {
            content: "SECURE UPLOAD PORTAL";
            position: absolute;
            top: -10px; left: 15px;
            background: var(--bg-deep);
            padding: 0 10px;
            font-size: 0.6rem;
            color: var(--eva-red);
            font-weight: bold;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.65rem;
            font-weight: bold;
            text-transform: uppercase;
            color: var(--eva-red);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        input[type="text"], 
        input[type="email"],
        textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-muted);
            padding: 12px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            border-color: white;
            background: rgba(255, 255, 255, 0.1);
        }

        .file-input-wrapper {
            position: relative;
            border: 1px dashed var(--border-muted);
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .file-input-wrapper:hover {
            border-color: white;
            background: rgba(255, 255, 255, 0.05);
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .submit-btn {
            background: var(--eva-red);
            color: white;
            border: 1px solid white;
            padding: 15px 30px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
        }

        .submit-btn:hover {
            background: white;
            color: var(--eva-red);
        }

        .back-link {
            display: inline-block;
            margin-top: 40px;
            color: #555;
            text-decoration: none;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .back-link:hover { color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 class="title">THE ARCHIVE</h1>
    </div>

    <p style="font-size: 0.75rem; letter-spacing: 1px; margin-bottom: 30px; opacity: 0.6; text-transform: uppercase;">
        // MODERATED USER UPLOADS
    </p>

    <div class="gallery-grid">
        <div class="gallery-item">WAITING FOR SIGNAL...</div>
        <div class="gallery-item">WAITING FOR SIGNAL...</div>
        <div class="gallery-item">WAITING FOR SIGNAL...</div>
    </div>

    <div class="upload-terminal">
        <form action="https://formspree.io/f/maqlgdqn" method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label>Identifier (Name/Handle)</label>
                <input type="text" name="name" required placeholder="USER_01">
            </div>
            
            <div class="form-group">
                <label>Transmission Data (Image/Proof)</label>
                <div class="file-input-wrapper">
                    <span style="font-size: 0.7rem; opacity: 0.5;">CLICK TO ATTACH FILE OR DRAG AND DROP</span>
                    <input type="file" name="upload" required>
                </div>
            </div>

            <div class="form-group">
                <label>Additional Notes</label>
                <textarea name="message" rows="3" placeholder="OPTIONAL ENCRYPTED MESSAGE..."></textarea>
            </div>

            <button type="submit" class="submit-btn">INITIATE TRANSMISSION</button>
        </form>
    </div>

    <a href="index.html" class="back-link">← RETURN TO MAIN TERMINAL</a>
</div>

</body>
</html>
