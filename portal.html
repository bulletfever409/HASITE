<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HA // ARCHIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Bellefair&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-deep: #0a0d12; --off-white: #e0e0e0; --eva-red: #ff003c; --border-muted: #1e2630; }
        body {
            background-color: var(--bg-deep); color: var(--off-white); font-family: 'Inter', sans-serif;
            margin: 0; padding: 40px; background-image: linear-gradient(#0a0d12, #05070a);
        }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { font-family: 'Bellefair', serif; font-size: 3.5rem; color: var(--eva-red); text-transform: uppercase; margin: 0; }
        
        .gallery-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px; margin: 40px 0;
        }
        .gallery-item {
            border: 1px solid var(--border-muted); aspect-ratio: 1/1; 
            background: #000; display: flex; align-items: center; justify-content: center;
            font-size: 0.6rem; color: #444; text-transform: uppercase;
        }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }

        .upload-terminal {
            border: 1px solid var(--eva-red); background: #000; position: relative; padding: 5px;
        }
        .upload-terminal::before {
            content: "TRANSMISSION PORTAL"; position: absolute; top: -10px; left: 15px;
            background: var(--bg-deep); padding: 0 10px; font-size: 0.6rem; color: var(--eva-red); font-weight: bold;
        }

        iframe {
            width: 100%; height: 800px; border: none;
            filter: invert(90%) hue-rotate(180deg) brightness(1.1) contrast(1.1);
        }
        .back-btn {
            display: inline-block; margin-top: 30px; color: #555; text-decoration: none;
            font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px;
        }
        .back-btn:hover { color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>THE ARCHIVE</h1>
        <p style="font-size: 0.7rem; opacity: 0.6; letter-spacing: 1px;">// MODERATED TRANSMISSIONS</p>

        <div class="gallery-grid">
            <div class="gallery-item">Waiting for Signal</div>
            <div class="gallery-item">Waiting for Signal</div>
            <div class="gallery-item">Waiting for Signal</div>
        </div>

        <div class="upload-terminal">
            <iframe src="YOUR_LINK_HERE">Loading…</iframe>
        </div>

        <a href="index.html" class="back-btn">← RETURN</a>
    </div>
</body>
</html>
