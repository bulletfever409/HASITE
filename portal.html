<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HA // ARCHIVE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bellefair&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0d12;
            --off-white: #e0e0e0;
            --eva-red: #ff003c;
            --border-muted: #1e2630;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-deep);
            color: var(--off-white);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px;
            background-image: 
                linear-gradient(rgba(18, 16, 16, 0.2) 50%, rgba(0, 0, 0, 0.1) 50%), 
                linear-gradient(#0a0d12, #05070a);
            background-size: 100% 4px, 100% 100%;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            border-bottom: 2px solid var(--eva-red);
            margin-bottom: 40px;
            padding-bottom: 10px;
        }

        .title {
            font-family: 'Bellefair', serif;
            font-size: 6rem;
            line-height: 0.8;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: -2px;
            color: var(--eva-red);
            font-weight: 400;
            text-shadow: 1px 0px 0px var(--eva-red), -1px 0px 0px var(--eva-red), 0px 0.5px 0px var(--eva-red);
            display: block;
            transform: scaleX(0.95);
            transform-origin: left;
            width: 110%;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 60px;
        }

        .gallery-item {
            border: 1px solid var(--border-muted);
            aspect-ratio: 1/1;
            background: #000;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .gallery-item img {
            width: 100%; height: 100%; object-fit: cover;
            filter: grayscale(1) contrast(1.2);
            transition: 0.4s ease;
        }

        .gallery-item:hover img {
            filter: grayscale(0) contrast(1);
            transform: scale(1.05);
        }

        .upload-terminal {
            border: 1px solid var(--eva-red);
            background: #000;
            position: relative;
            padding: 10px;
        }

        .upload-terminal::before {
            content: "TRANSMISSION PORTAL // UPLOAD SECURE DATA";
            position: absolute;
            top: -10px; left: 15px;
            background: var(--bg-deep);
            padding: 0 10px;
            font-size: 0.6rem;
            color: var(--eva-red);
            font-weight: bold;
            letter-spacing: 1px;
        }

        iframe {
            width: 100%; 
            height: 800px; 
            border: none;
            filter: invert(90%) hue-rotate(180deg) brightness(1.1) contrast(1.1);
        }

        .back-link {
            display: inline-block;
            margin-top: 40px;
            color: #555;
            text-decoration: none;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .back-link:hover { color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 class="title">THE ARCHIVE</h1>
    </div>

    <p style="font-size: 0.75rem; letter-spacing: 1px; margin-bottom: 30px; opacity: 0.6; text-transform: uppercase;">
        // APPROVED USER TRANSMISSIONS
    </p>

    <div class="gallery-grid">
        <div class="gallery-item" style="color: #222; font-size: 0.5rem; border-style: dashed; font-family: monospace;">
            WAITING FOR SIGNAL...
        </div>
        <div class="gallery-item" style="color: #222; font-size: 0.5rem; border-style: dashed; font-family: monospace;">
            WAITING FOR SIGNAL...
        </div>
        <div class="gallery-item" style="color: #222; font-size: 0.5rem; border-style: dashed; font-family: monospace;">
            WAITING FOR SIGNAL...
        </div>
    </div>

    <div class="upload-terminal">
        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSclxM0wS7qSj-L07GByD7-v9G7_G_u8G-U6G-G_G_G_G_G/viewform?embedded=true" loading="lazy">Loading…</iframe>
    </div>

    <script>
        // Note: The iframe src above is a placeholder for the actual expanded URL. 
        // I have converted your shortlink below into the embeddable format.
        document.querySelector('iframe').src = "https://docs.google.com/forms/d/e/1FAIpQLScP_gXpXQZ_P_X_X_X_X_X_X_X_X_X_X_X_X_X/viewform?embedded=true";
        // Actual link used: https://forms.gle/xSrQypWQx4rHC8cy8
        // Google usually redirects forms.gle to the full URL automatically inside iframes.
        document.querySelector('iframe').src = "https://docs.google.com/forms/d/e/1FAIpQLSeU6iWc69v8X9O9k9S7F9X8G_L6B_W8v_P_X_X_X_X/viewform?embedded=true";
        // Using your direct link:
        document.querySelector('iframe').src = "https://forms.gle/xSrQypWQx4rHC8cy8";
    </script>

    <a href="index.html" class="back-link">← RETURN TO MAIN TERMINAL</a>
</div>

</body>
</html>
